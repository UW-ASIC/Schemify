[workspace]
members = [
    "crates/core",
    "crates/handler",
    "crates/io",
    "crates/display",
    "crates/plugins",
    "crates/sim",
    "scripts",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[package]
name = "schemify"
version.workspace = true
edition.workspace = true

[dependencies]
schemify-display = { path = "crates/display" }
schemify-handler = { path = "crates/handler" }
schemify-core = { path = "crates/core" }
clap = { version = "4", features = ["derive"] }
