[workspace]
members = [
    "crates/core",
    "crates/handler",
    "crates/io",
    "crates/display",
    "crates/plugins",
    "crates/sim",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
