<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Git branch line (vertical) -->
  <line x1="20" y1="12" x2="20" y2="52" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>

  <!-- Branch fork line -->
  <path d="M20 30 C26 30 30 24 36 24" stroke="#F44336" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Commit nodes on main branch -->
  <circle cx="20" cy="16" r="4" fill="#F44336"/>
  <circle cx="20" cy="30" r="4" fill="#F44336"/>
  <circle cx="20" cy="48" r="4" fill="#F44336"/>

  <!-- Branch commit node -->
  <circle cx="36" cy="24" r="3.5" fill="#F44336"/>

  <!-- Annotation/blame bubble -->
  <rect x="33" y="34" width="22" height="14" rx="3" ry="3" fill="none" stroke="#F44336" stroke-width="2"/>
  <!-- Bubble pointer/tail -->
  <polygon points="35,48 33,53 39,48" fill="#F44336"/>
  <!-- Annotation lines inside bubble -->
  <line x1="37" y1="39" x2="51" y2="39" stroke="#F44336" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="43" x2="47" y2="43" stroke="#F44336" stroke-width="1.5" stroke-linecap="round"/>
</svg>
