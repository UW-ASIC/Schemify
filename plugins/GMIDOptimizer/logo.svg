<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Axes -->
  <line x1="12" y1="52" x2="56" y2="52" stroke="#666" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="52" x2="12" y2="8" stroke="#666" stroke-width="2" stroke-linecap="round"/>

  <!-- Optimization curve (smooth curve with a peak) -->
  <path d="M14 48 C20 46, 24 40, 28 32 C32 24, 34 16, 38 14 C42 12, 46 18, 50 28 C52 34, 54 40, 56 44"
        fill="none" stroke="#FF9800" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Optimal point (peak) - filled dot -->
  <circle cx="38" cy="14" r="3.5" fill="#FF9800"/>

  <!-- Crosshair/target at optimal point -->
  <circle cx="38" cy="14" r="8" fill="none" stroke="#FF9800" stroke-width="1.2" opacity="0.5"/>
  <line x1="38" y1="4" x2="38" y2="24" stroke="#FF9800" stroke-width="1" opacity="0.4" stroke-dasharray="2 2"/>
  <line x1="28" y1="14" x2="48" y2="14" stroke="#FF9800" stroke-width="1" opacity="0.4" stroke-dasharray="2 2"/>

  <!-- Small sample points along curve (Bayesian samples) -->
  <circle cx="20" cy="44" r="1.8" fill="none" stroke="#FF9800" stroke-width="1.2" opacity="0.6"/>
  <circle cx="28" cy="32" r="1.8" fill="none" stroke="#FF9800" stroke-width="1.2" opacity="0.6"/>
  <circle cx="46" cy="20" r="1.8" fill="none" stroke="#FF9800" stroke-width="1.2" opacity="0.6"/>
  <circle cx="54" cy="42" r="1.8" fill="none" stroke="#FF9800" stroke-width="1.2" opacity="0.6"/>
</svg>
