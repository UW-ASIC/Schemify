<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Op-amp triangle -->
  <polygon points="12,10 12,54 52,32" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Plus input marker -->
  <line x1="16" y1="22" x2="22" y2="22" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19" y1="19" x2="19" y2="25" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Minus input marker -->
  <line x1="16" y1="42" x2="22" y2="42" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Input leads -->
  <line x1="2" y1="22" x2="12" y2="22" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2" y1="42" x2="12" y2="42" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Output lead -->
  <line x1="52" y1="32" x2="62" y2="32" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Output node dot -->
  <circle cx="62" cy="32" r="2" fill="#4CAF50"/>
</svg>
