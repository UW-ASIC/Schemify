<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Two curved swap arrows forming a cycle -->
  <!-- Top arrow: curves from right to left -->
  <path d="M 44 18 C 44 10, 20 10, 20 18"
        fill="none" stroke="#00BCD4" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top arrowhead pointing left -->
  <polygon points="20,12 20,24 12,18" fill="#00BCD4"/>

  <!-- Bottom arrow: curves from left to right -->
  <path d="M 20 46 C 20 54, 44 54, 44 46"
        fill="none" stroke="#00BCD4" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom arrowhead pointing right -->
  <polygon points="44,40 44,52 52,46" fill="#00BCD4"/>

  <!-- Left node (circle) -->
  <circle cx="20" cy="32" r="5" fill="#00BCD4" opacity="0.85"/>

  <!-- Right node (circle) -->
  <circle cx="44" cy="32" r="5" fill="#00BCD4" opacity="0.85"/>

  <!-- Vertical connectors from nodes to arrows -->
  <line x1="20" y1="27" x2="20" y2="18" stroke="#00BCD4" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="20" y1="37" x2="20" y2="46" stroke="#00BCD4" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="44" y1="27" x2="44" y2="18" stroke="#00BCD4" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="44" y1="37" x2="44" y2="46" stroke="#00BCD4" stroke-width="3.5" stroke-linecap="round"/>
</svg>
