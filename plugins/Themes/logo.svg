<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Half-dark / half-light circle representing theme switching -->
  <circle cx="32" cy="32" r="28" stroke="#E91E63" stroke-width="2.5" fill="none"/>
  <!-- Dark half (left) -->
  <path d="M32 4 A28 28 0 0 0 32 60 Z" fill="#2A2A2A"/>
  <!-- Light half (right) -->
  <path d="M32 4 A28 28 0 0 1 32 60 Z" fill="#F5F5F5"/>
  <!-- Three color swatches across the center -->
  <circle cx="22" cy="32" r="5" fill="#E91E63"/>
  <circle cx="32" cy="32" r="5" fill="#7C4DFF"/>
  <circle cx="42" cy="32" r="5" fill="#00BCD4"/>
</svg>
