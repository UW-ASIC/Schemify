  <!-- Content lines on left document -->
  <line x1="10" y1="26" x2="20" y2="26" stroke="#2196F3" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="32" x2="18" y2="32" stroke="#2196F3" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="38" x2="20" y2="38" stroke="#2196F3" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Right document (target .chn) -->
  <path d="M40 12 L40 52 L58 52 L58 18 L52 12 Z" fill="none" stroke="#2196F3" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Dog-ear fold on right document -->
