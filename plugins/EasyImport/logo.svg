  <!-- Content lines on right document -->
  <line x1="44" y1="26" x2="54" y2="26" stroke="#2196F3" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="44" y1="32" x2="52" y2="32" stroke="#2196F3" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="44" y1="38" x2="54" y2="38" stroke="#2196F3" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Arrow between documents -->
  <line x1="26" y1="32" x2="36" y2="32" stroke="#2196F3" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="33,28 38,32 33,36" fill="none" stroke="#2196F3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
