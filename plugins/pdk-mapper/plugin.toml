[plugin]
id = "pdk-mapper"
name = "PDK Mapper"
version = "0.1.0"
description = "Retarget a schematic between PDKs: gm/Id LUT inversion plus simulation-in-the-loop refinement for first-order equivalent behavior"
entry = "cargo run --release"

[capabilities]
panels = true
commands = true
overlays = false
theme = false

[[panels.panel]]
name = "PDK Mapper"
slot = "RightSidebar"
priority = 11

[[commands.command]]
name = "map_to_target_pdk"
description = "Map the current schematic onto the selected target PDK"
