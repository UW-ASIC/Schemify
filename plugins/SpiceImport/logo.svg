<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Document (left side) -->
  <path d="M8 8 L24 8 L30 14 L30 48 L8 48 Z" fill="none" stroke="#795548" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Document fold corner -->
  <path d="M24 8 L24 14 L30 14" fill="none" stroke="#795548" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Text lines on document -->
  <line x1="13" y1="22" x2="25" y2="22" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="28" x2="22" y2="28" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="34" x2="24" y2="34" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="40" x2="20" y2="40" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Arrow (center) -->
  <path d="M33 28 L40 28 L40 24 L48 30 L40 36 L40 32 L33 32 Z" fill="#795548" opacity="0.85"/>

  <!-- Schematic circuit (right side) -->
  <!-- Component box -->
  <rect x="50" y="16" width="8" height="12" rx="1" fill="none" stroke="#795548" stroke-width="2"/>
  <!-- Wires from top component -->
  <line x1="54" y1="12" x2="54" y2="16" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="28" x2="54" y2="36" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <!-- Junction/node dot -->
  <circle cx="54" cy="36" r="1.8" fill="#795548"/>
  <!-- Horizontal wire from junction -->
  <line x1="54" y1="36" x2="46" y2="36" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <!-- Vertical wire down from junction -->
  <line x1="46" y1="36" x2="46" y2="44" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <!-- Second component (resistor zigzag) -->
  <polyline points="54,36 54,40 52,42 56,44 52,46 56,48 54,50 54,52" fill="none" stroke="#795548" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ground symbol -->
  <line x1="50" y1="52" x2="58" y2="52" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <line x1="51.5" y1="54.5" x2="56.5" y2="54.5" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="57" x2="55" y2="57" stroke="#795548" stroke-width="1" stroke-linecap="round"/>
  <!-- Pin dot at top -->
  <circle cx="54" cy="12" r="1.8" fill="#795548"/>
  <!-- Small node at horizontal wire end -->
  <circle cx="46" cy="44" r="1.8" fill="#795548"/>
</svg>