[plugin]
name        = "AgentHarness"
version     = "0.1.0"
author      = "UWASIC"
entry       = "AgentHarness.so"
description = "LLM agent harness: JSON-RPC unix socket exposing the full Schemify command surface, file I/O, and plugin skill docs."
tags        = ["agent", "llm", "automation", "ai", "harness"]
scope       = "user"

[capabilities]
file_read_project      = true
file_read_plugin_data  = true
file_write_plugin_data = true
schematic_mutate       = true
network                = true

[build]
apt_deps = []
