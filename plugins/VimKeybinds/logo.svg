<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Stylized V shape (Vim aesthetic) -->
  <path d="M12 12 L32 52 L52 12" stroke="#8BC34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor block at the bottom tip of the V -->
  <rect x="27" y="44" width="10" height="14" rx="1.5" fill="#8BC34A" opacity="0.3"/>
  <!-- hjkl directional arrows around the V -->
  <!-- Left arrow (h) -->
  <path d="M8 32 L3 32" stroke="#8BC34A" stroke-width="2" stroke-linecap="round"/>
  <path d="M6 29.5 L3 32 L6 34.5" stroke="#8BC34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Down arrow (j) -->
  <path d="M32 58 L32 63" stroke="#8BC34A" stroke-width="2" stroke-linecap="round"/>
  <path d="M29.5 60.5 L32 63 L34.5 60.5" stroke="#8BC34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Up arrow (k) -->
  <path d="M32 6 L32 1" stroke="#8BC34A" stroke-width="2" stroke-linecap="round"/>
  <path d="M29.5 3.5 L32 1 L34.5 3.5" stroke="#8BC34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right arrow (l) -->
  <path d="M56 32 L61 32" stroke="#8BC34A" stroke-width="2" stroke-linecap="round"/>
  <path d="M58 29.5 L61 32 L58 34.5" stroke="#8BC34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
