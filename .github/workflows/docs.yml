name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs_site/**'
      - 'examples/**'
      - 'scripts/build-viewer.mjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: docs_site
        run: bun install

      - name: Build static site
        working-directory: docs_site
        run: bun run build

      # ── Embed Schemify viewer at docs_site/dist/schematic/ ──────────────────

      - name: Resolve latest Schemify release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver=$(gh release view --repo UWASIC/Schemify --json tagName -q .tagName 2>/dev/null || echo "")
          echo "tag=${ver}" >> "$GITHUB_OUTPUT"

      - name: Download WASM release assets
        if: steps.version.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .schemify-assets
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo UWASIC/Schemify \
            --pattern "schemify.wasm" \
            --pattern "web.js"        \
            --pattern "schemify_host.js" \
            --pattern "vfs.js"        \
            --pattern "vfs-worker.js" \
            --dir .schemify-assets

      - name: Build schematic viewer
        if: steps.version.outputs.tag != ''
        working-directory: examples
        run: |
          node "$GITHUB_WORKSPACE/scripts/build-viewer.mjs" \
            "$GITHUB_WORKSPACE/.schemify-assets/schemify.wasm" \
            "$GITHUB_WORKSPACE/.schemify-assets/web.js"       \
            "$GITHUB_WORKSPACE/docs_site/dist/schematic"

      # ── Upload & deploy ──────────────────────────────────────────────────────

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs_site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
