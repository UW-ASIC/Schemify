name: Build Plugins

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'plugins/**/plugin.toml'
      - 'plugins/**/src/**'
      - 'plugins/**/build.zig'
      - 'plugins/**/build.zig.zon'
      - 'plugins/**/Makefile'
      - 'plugins/**/Cargo.toml'
      - 'plugins/**/flake.nix'
      - 'tools/api/**'
      - 'tools/scripts/gen_registry.py'
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: 'Rebuild every plugin even if unchanged'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-plugins-${{ github.ref }}
  cancel-in-progress: true

# ── Job 1: Discover buildable plugins ─────────────────────────────────────────
jobs:

  discover:
    name: Discover plugins
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan plugins with gen_registry.py
        id: scan
        env:
          REGISTRY_REPO:        ${{ github.repository }}
          REGISTRY_BRANCH:      ${{ github.ref_name }}
          REGISTRY_RELEASE_TAG: plugins-latest
        run: |
          matrix=$(python3 tools/scripts/gen_registry.py --list-buildable)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered plugins:"
          echo "$matrix" | python3 -m json.tool

  # ── Job 2: Build (matrix — one job per plugin) ──────────────────────────────
  build:
    name: Build ${{ matrix.plugin.id }} (${{ matrix.plugin.build_system }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: recursive

      # ── Incremental check ──────────────────────────────────────────────────
      - name: Check for changes
        id: changed
        run: |
          FORCE="${{ github.event.inputs.force_rebuild_all }}"
          if [ "$FORCE" = "true" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PLUGIN_DIR="${{ matrix.plugin.dir }}"
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "ALL")

          if echo "$CHANGED" | grep -qE \
               "^${PLUGIN_DIR}/|^tools/api/|^tools/scripts/gen_registry\.py"; then
            echo "rebuild=true"  >> "$GITHUB_OUTPUT"
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
            echo "No changes in $PLUGIN_DIR – skipping."
          fi

      # ── Install Nix ───────────────────────────────────────────────────────
      - name: Install Nix
        if: steps.changed.outputs.rebuild == 'true'
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        if: steps.changed.outputs.rebuild == 'true'
        uses: DeterminateSystems/magic-nix-cache-action@main

      # ── Build native ────────────────────────────────────────────────────────
      - name: Build native (.so)
        if: steps.changed.outputs.rebuild == 'true'
        working-directory: '${{ matrix.plugin.dir }}'
        run: |
          case "${{ matrix.plugin.build_system }}" in
            zig)
              nix develop --command zig build -Doptimize=ReleaseSafe
              ;;
            make)
              nix develop --command make native
              ;;
            cargo)
              nix develop --command make native
              ;;
          esac

      # ── Build WASM ──────────────────────────────────────────────────────────
      - name: Build WASM (.wasm)
        if: steps.changed.outputs.rebuild == 'true'
        working-directory: '${{ matrix.plugin.dir }}'
        continue-on-error: true
        run: |
          case "${{ matrix.plugin.build_system }}" in
            zig)
              nix develop --command zig build -Dbackend=web -Doptimize=ReleaseSafe
              ;;
            make)
              nix develop --command make web || echo "WASM build not available for this plugin."
              ;;
            cargo)
              nix develop --command make web || echo "WASM build not available for this plugin."
              ;;
          esac

      # ── Collect artifacts ───────────────────────────────────────────────────
      - name: Collect built artifacts
        if: steps.changed.outputs.rebuild == 'true'
        run: |
          mkdir -p dist
          ENTRY="${{ matrix.plugin.entry }}"
          DIR="${{ matrix.plugin.dir }}"
          BUILD="${{ matrix.plugin.build_system }}"

          case "$BUILD" in
            zig)
              # Zig outputs to zig-out/
              find "$DIR/zig-out" \( -name '*.so' -o -name '*.dylib' \) 2>/dev/null \
                | while read f; do
                    base=$(basename "$f")
                    case "$base" in lib*) base="${base#lib}" ;; esac
                    cp "$f" "dist/$base"
                    echo "  native: $base"
                  done
              find "$DIR/zig-out" -name '*.wasm' 2>/dev/null \
                | while read f; do
                    cp "$f" "dist/$(basename $f)"
                    echo "  wasm: $(basename $f)"
                  done
              ;;
            make|cargo)
              # Make/Cargo outputs to plugin directory
              for f in "$DIR"/*.so; do
                [ -f "$f" ] && cp "$f" "dist/${ENTRY}.so" && echo "  native: ${ENTRY}.so"
              done
              for f in "$DIR"/*.wasm; do
                [ -f "$f" ] && cp "$f" "dist/${ENTRY}.wasm" && echo "  wasm: ${ENTRY}.wasm"
              done
              # Cargo also outputs to target/
              find "$DIR/target/release" -maxdepth 1 -name '*.so' -o -name '*.dylib' 2>/dev/null \
                | head -1 | while read f; do
                    cp "$f" "dist/${ENTRY}.so"
                    echo "  native: ${ENTRY}.so"
                  done
              WASM_DIR="$DIR/target/wasm32-unknown-unknown/release"
              find "$WASM_DIR" -maxdepth 1 -name '*.wasm' 2>/dev/null \
                | head -1 | while read f; do
                    cp "$f" "dist/${ENTRY}.wasm"
                    echo "  wasm: ${ENTRY}.wasm"
                  done
              ;;
          esac

          echo ""
          echo "Collected artifacts:"
          ls -lh dist/ 2>/dev/null || echo "(none)"

      - name: Upload artifact
        if: steps.changed.outputs.rebuild == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin.id }}-artifacts
          path: dist/
          if-no-files-found: warn

  # ── Job 3: Update registry + publish release ────────────────────────────────
  publish:
    name: Update registry & release
    runs-on: ubuntu-latest
    needs: build
    if: always() && !contains(needs.build.result, 'cancelled')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate registry.json
        env:
          REGISTRY_REPO:        ${{ github.repository }}
          REGISTRY_BRANCH:      ${{ github.ref_name }}
          REGISTRY_RELEASE_TAG: plugins-latest
        run: |
          python3 tools/scripts/gen_registry.py
          echo ""
          cat plugins/registry.json

      - name: Commit registry.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/registry.json
          if git diff --cached --quiet; then
            echo "registry.json unchanged."
          else
            git commit -m "chore: regenerate plugins/registry.json [skip ci]"
            git push
          fi

      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List downloaded binaries
        run: find dist/ -type f | sort || echo "(none)"

      - name: Publish to plugins-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view plugins-latest --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            gh release create plugins-latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Plugin Binaries (latest)" \
              --notes "Rolling release – updated automatically on every push to main.
          Download by the in-app Plugin Marketplace." \
              --prerelease
          fi

          find dist/ -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.wasm' \) | while read f; do
            echo "Uploading $(basename $f)"
            gh release upload plugins-latest "$f" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          done

      - name: Step summary
        run: |
          echo "### Plugin release updated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          find dist/ -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.wasm' \) | while read f; do
            sz=$(du -sh "$f" | cut -f1)
            echo "| \`$(basename $f)\` | ${sz}B |" >> "$GITHUB_STEP_SUMMARY"
          done || echo "_(no binaries)_" >> "$GITHUB_STEP_SUMMARY"
