name: Build Plugins

# Plugins are Python subprocess processes communicating via JSON-RPC 2.0.
# This workflow validates, packages, and publishes them.
#
# Native:  Python source + SDK bundled as .tar.gz (run via `python3`)
# Web:     Same bundle + Pyodide loader for in-browser execution via Web Worker

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**/plugin.toml'
      - 'plugins/**/src/**'
      - 'tools/sdk/python/**'
      - 'tools/scripts/gen_registry.py'
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: 'Rebuild every plugin even if unchanged'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-plugins-${{ github.ref }}
  cancel-in-progress: true

# ── Job 1: Discover plugins ──────────────────────────────────────────────────
jobs:

  discover:
    name: Discover plugins
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan plugins with gen_registry.py
        id: scan
        env:
          REGISTRY_REPO:        ${{ github.repository }}
          REGISTRY_BRANCH:      ${{ github.ref_name }}
          REGISTRY_RELEASE_TAG: plugins-latest
        run: |
          matrix=$(python3 tools/scripts/gen_registry.py --list-buildable)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered plugins:"
          echo "$matrix" | python3 -m json.tool

  # ── Job 2: Validate & package (one per plugin) ─────────────────────────────
  build:
    name: Package ${{ matrix.plugin.id }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── Incremental check ────────────────────────────────────────────────
      - name: Check for changes
        id: changed
        run: |
          FORCE="${{ github.event.inputs.force_rebuild_all }}"
          if [ "$FORCE" = "true" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PLUGIN_DIR="${{ matrix.plugin.dir }}"
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "ALL")

          if echo "$CHANGED" | grep -qE \
               "^${PLUGIN_DIR}/|^tools/sdk/python/|^tools/scripts/gen_registry\.py"; then
            echo "rebuild=true"  >> "$GITHUB_OUTPUT"
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
            echo "No changes in $PLUGIN_DIR or SDK -- skipping."
          fi

      - uses: actions/setup-python@v5
        if: steps.changed.outputs.rebuild == 'true'
        with:
          python-version: '3.12'

      # ── Validate Python ──────────────────────────────────────────────────
      - name: Validate syntax
        if: steps.changed.outputs.rebuild == 'true'
        working-directory: '${{ matrix.plugin.dir }}'
        run: |
          echo "Checking Python syntax..."
          find src/ -name '*.py' -exec python3 -m py_compile {} +
          echo "All files compile OK."

      # ── Package native bundle ────────────────────────────────────────────
      - name: Package native bundle
        if: steps.changed.outputs.rebuild == 'true'
        run: |
          PLUGIN_DIR="${{ matrix.plugin.dir }}"
          PLUGIN_ID="${{ matrix.plugin.id }}"
          mkdir -p dist

          # Bundle: plugin source + SDK
          BUNDLE_DIR="dist/${PLUGIN_ID}"
          mkdir -p "${BUNDLE_DIR}/sdk"
          cp -r "${PLUGIN_DIR}/plugin.toml" "${BUNDLE_DIR}/"
          cp -r "${PLUGIN_DIR}/src" "${BUNDLE_DIR}/"
          cp tools/sdk/python/schemify_plugin.py "${BUNDLE_DIR}/sdk/"

          # Create tarball
          tar -czf "dist/${PLUGIN_ID}.tar.gz" -C dist "${PLUGIN_ID}"
          echo "Native bundle: dist/${PLUGIN_ID}.tar.gz"
          ls -lh "dist/${PLUGIN_ID}.tar.gz"

      # ── Package web bundle (Pyodide-ready) ───────────────────────────────
      - name: Package web bundle
        if: steps.changed.outputs.rebuild == 'true'
        run: |
          PLUGIN_DIR="${{ matrix.plugin.dir }}"
          PLUGIN_ID="${{ matrix.plugin.id }}"

          WEB_DIR="dist/${PLUGIN_ID}-web"
          mkdir -p "${WEB_DIR}"

          # Copy plugin source + SDK
          cp -r "${PLUGIN_DIR}/plugin.toml" "${WEB_DIR}/"
          cp -r "${PLUGIN_DIR}/src" "${WEB_DIR}/"
          cp tools/sdk/python/schemify_plugin.py "${WEB_DIR}/"

          # Pyodide loader: runs the plugin in a Web Worker, bridges
          # JSON-RPC from postMessage to the SDK's stdin/stdout contract.
          cat > "${WEB_DIR}/worker.js" << 'WORKER_EOF'
          // Schemify Plugin Web Worker -- loads Python plugin via Pyodide.
          // JSON-RPC messages arrive via postMessage, delivered to the plugin
          // as if they were stdin lines. Plugin stdout writes are posted back.
          importScripts("https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js");

          let pyodide = null;

          async function init() {
            pyodide = await loadPyodide();

            // Load SDK + plugin source
            const sdkResp = await fetch("schemify_plugin.py");
            const sdkCode = await sdkResp.text();
            const pluginResp = await fetch("src/plugin.py");
            const pluginCode = await pluginResp.text();

            // Patch stdin/stdout to use postMessage
            pyodide.runPython(`
          import sys, io, json

          class JsonRpcStdin:
              def __init__(self):
                  self._lines = []
              def readline(self):
                  while not self._lines:
                      pass  # will be fed by JS
                  return self._lines.pop(0)
              def __iter__(self):
                  return self
              def __next__(self):
                  line = self.readline()
                  if not line:
                      raise StopIteration
                  return line

          class JsonRpcStdout:
              def write(self, data):
                  from js import postMessage
                  if data.strip():
                      postMessage(data.strip())
              def flush(self):
                  pass

          sys.stdin = JsonRpcStdin()
          sys.stdout = JsonRpcStdout()
            `);

            // Load SDK and plugin
            pyodide.runPython(sdkCode);
            pyodide.runPython(pluginCode);

            postMessage(JSON.stringify({jsonrpc: "2.0", method: "_worker/ready", params: {}}));
          }

          self.onmessage = (e) => {
            if (!pyodide) return;
            const stdin = pyodide.globals.get("sys").stdin;
            stdin._lines.append(e.data + "\n");
          };

          init();
          WORKER_EOF

          tar -czf "dist/${PLUGIN_ID}-web.tar.gz" -C dist "${PLUGIN_ID}-web"
          echo "Web bundle: dist/${PLUGIN_ID}-web.tar.gz"
          ls -lh "dist/${PLUGIN_ID}-web.tar.gz"

      - name: Upload artifact
        if: steps.changed.outputs.rebuild == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin.id }}-artifacts
          path: |
            dist/*.tar.gz
          if-no-files-found: warn

  # ── Job 3: Update registry + publish release ───────────────────────────────
  publish:
    name: Update registry & release
    runs-on: ubuntu-latest
    needs: build
    if: always() && !contains(needs.build.result, 'cancelled')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate registry.json
        env:
          REGISTRY_REPO:        ${{ github.repository }}
          REGISTRY_BRANCH:      ${{ github.ref_name }}
          REGISTRY_RELEASE_TAG: plugins-latest
        run: |
          python3 tools/scripts/gen_registry.py
          echo ""
          cat plugins/registry.json

      - name: Commit registry.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/registry.json
          if git diff --cached --quiet; then
            echo "registry.json unchanged."
          else
            git commit -m "chore: regenerate plugins/registry.json [skip ci]"
            git push
          fi

      - name: Download built bundles
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List downloaded bundles
        run: find dist/ -type f | sort || echo "(none)"

      - name: Publish to plugins-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view plugins-latest --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            gh release create plugins-latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Plugin Bundles (latest)" \
              --notes "Rolling release -- updated automatically on every push to main.
          Each plugin ships as two bundles:
          - \`.tar.gz\` — native (run via python3 subprocess)
          - \`-web.tar.gz\` — web (run via Pyodide in a Web Worker)" \
              --prerelease
          fi

          find dist/ -type f -name '*.tar.gz' | while read f; do
            echo "Uploading $(basename $f)"
            gh release upload plugins-latest "$f" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          done

      - name: Step summary
        run: |
          echo "### Plugin bundles updated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bundle | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          find dist/ -type f -name '*.tar.gz' | sort | while read f; do
            sz=$(du -sh "$f" | cut -f1)
            echo "| \`$(basename $f)\` | ${sz}B |" >> "$GITHUB_STEP_SUMMARY"
          done || echo "_(no bundles)_" >> "$GITHUB_STEP_SUMMARY"
