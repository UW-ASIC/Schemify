<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schemify</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        color: #ccc;
        font-family: system-ui, sans-serif;
      }
      canvas {
        width: 100% !important;
        height: 100% !important;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      #loading.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <h2>SchemifyRS</h2>
      <p>Loading...</p>
    </div>
    <canvas id="schemify_canvas"></canvas>
    <script type="module">
      import init from "./schemify_display.js";
      document.getElementById("loading").classList.add("hidden");
      await init();
    </script>
  </body>
</html>
