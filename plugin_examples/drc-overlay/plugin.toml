[plugin]
id = "drc-overlay"
name = "DRC Overlay"
version = "0.1.0"
description = "Design-rule-check overlay that marks unconnected pins"
entry = "cargo run --release"

[capabilities]
panels = true
commands = true
overlays = true
theme = false

[[panels.panel]]
name = "DRC Results"
slot = "BottomBar"
priority = 5

[[commands.command]]
name = "run_drc"
description = "Run design rule checks"
keybind = "Ctrl+D"
